name: Steinbach Credit Union
kind: company
description: >-
  Steinbach Credit Union (SCU) is a member-owned financial cooperative founded
  in 1941 and headquartered in Steinbach, Manitoba, Canada, operating three
  branches (Steinbach plus Linden Ridge and Lagimodiere in Winnipeg). With more
  than CA$10 billion in assets and over 115,000 consumer, business, and
  agricultural members, SCU is the largest credit union in Manitoba and among
  the ten largest in Canada. As a provincially chartered co-operative it is
  regulated in Manitoba with deposits guaranteed by the Manitoba Deposit
  Guarantee Corporation. SCU offers personal and business banking, mortgages,
  wealth management, and insurance, and delivers digital banking through an
  online portal (online.scu.mb.ca) and a mobile app built on the Celero core
  banking platform. Like nearly all Canadian credit unions, SCU exposes NO
  public first-party developer API or portal: Canada's federal Consumer-Driven
  Banking framework (Budget 2024 / Fall Economic Statement 2024, overseen by the
  Financial Consumer Agency of Canada) is legislated but not yet operational, so
  open finance remains voluntary. Consumer-permissioned data access to SCU
  accounts today is aggregator-mediated (e.g. Flinks, the National Bank-owned
  Canadian aggregator, and Plaid), and interbank money movement runs on the
  shared Canadian rails via Interac e-Transfer.
